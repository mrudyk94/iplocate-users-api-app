nelmio_api_doc:
    documentation:
        info:
            title: User REST API
            description: |
                REST API for user management with asynchronous processing via RabbitMQ.

                User creation requests are dispatched to a message queue using Symfony Messenger and handled asynchronously by background workers.
                IP geolocation is resolved using the iplocate.io API during processing.
            version: 1.0.0
        servers:
            - url: http://localhost:8045
              description: Local Docker environment
    areas:
        path_patterns:
            - ^/v1/api
