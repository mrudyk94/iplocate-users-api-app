framework:
    messenger:
        stop_worker_on_signals: true
        default_bus: messenger.bus.default

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 5
                    delay: 1000
                options:
                    exchange:
                        name: messages
                    queues:
                        messages: ~

        routing:
            App\Application\Message\CreateUserMessage: async

